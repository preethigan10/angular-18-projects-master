<div class="d-flex justify-content-center align-items-center min-vh-100">
  <div class="col-md-5 col-lg-4 mx-auto">
    <div class="search-box p-3 shadow rounded bg-white">
      <h2 class="text-center mb-3">
        <i class="fa fa-ticket me-2"></i>Book Your Bus Ticket
      </h2>
      <form novalidate="" class="ng-untouched ng-pristine ng-invalid">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label"
              ><i class="fa fa-map-marker me-1"></i>From</label
            >
            <select
              name="fromLocationId"
              class="form-select ng-untouched ng-pristine ng-valid"
            >
              <option></option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label"
              ><i class="fa fa-map-marker me-1"></i>To</label
            >
            <select
              name="toLocationId"
              class="form-select ng-untouched ng-pristine ng-valid"
            >
              <option></option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label"
              ><i class="fa fa-calendar-check-o me-1"></i>Date of Journey</label
            ><input
              type="date"
              name="date"
              required=""
              class="form-control ng-untouched ng-pristine ng-invalid"
            />
          </div>
          <div class="col-12 text-center">
            <button type="button" class="btn btn-primary btn-lg w-100">
              <i class="fa fa-search-plus me-2"></i>Search Buses
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
