<app-alert></app-alert>
<div class="container mt-4">
  <div class="row">
    <!-- LEFT : CATEGORY CARD -->
    <div class="col-md-3">
      <div class="card">
        <div class="card-header fw-bold">Categories</div>

        <ul class="list-group list-group-flush">
          <li
            class="list-group-item category-item"
            (click)="showAllProducts()"
            [class.active-category]="selectedCategory === 'all'"
          >
            All Categories
          </li>
          <li
            class="list-group-item category-item"
            *ngFor="let cat of categories"
            (click)="filterByCategory(cat)"
            [class.active-category]="selectedCategory === cat"
          >
            {{ cat }}
          </li>
        </ul>
      </div>
    </div>

    <!-- RIGHT : PRODUCTS -->
    <div class="col-md-9">
      <div class="row">
        <div
          class="d-flex justify-content-between align-items-center mb-3 category-info"
        >
          <h5 class="mb-0">
            {{ selectedCategory === "all" ? "All Products" : selectedCategory }}
          </h5>

          <span class="mb-0"> {{ filteredProducts.length }} Products </span>
        </div>
        <div class="col-md-4 mb-4" *ngFor="let product of filteredProducts">
          <!-- product cards -->
          <div class="card product-card h-100">
            <img
              [src]="product.image"
              class="card-img-top"
              height="200"
              style="object-fit: cover"
              (click)="goToProductDetails(product.id)"
            />

            <div class="card-body">
              <h6 class="fw-bold">
                {{ product.title }}
              </h6>

              <!-- short description -->
              <p class="text-muted small">
                {{ product.description }}
              </p>
            </div>

            <!-- price + button -->
            <div
              class="card-footer d-flex justify-content-between align-items-center"
            >
              <span class="text-success fs-5 fw-bold">
                ₹{{ product.price }}
              </span>
              <!-- Add to Cart / Quantity -->              
                <button
                  class="btn btn-primary btn-sm" [disabled]="!product.inStock"
                  (click)="addToCart(product)"
                >
                  Add to Cart
                </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
