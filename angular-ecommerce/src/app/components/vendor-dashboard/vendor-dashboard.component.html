<div class="vendor-dashboard container">
  <!-- TOP STATS -->
  <div class="row stats">
    <div class="col card">
      💰 Total Sales
      <h3>{{ totalSales | currency: "INR" }}</h3>
    </div>
    <div class="col card">
      📦 Orders
      <h3>{{ totalOrders }}</h3>
    </div>
    <div class="col card">
      🛍️ Products
      <h3>{{ totalProducts }}</h3>
    </div>
    <div class="col card warning">
      ⚠️ Low Stock
      <h3>{{ lowStock() }}</h3>
    </div>
    <div class="row mt-3">
      <p class="text-muted small">Demo Charts for visualization</p>
      <!-- LEFT CHART -->
      <div class="col-lg-6">
        <div class="chart-box">
          <h6 class="chart-title">Sales Overview</h6>
          <canvas #salesChart></canvas>
        </div>
      </div>

      <!-- RIGHT CHART -->
      <div class="col-lg-6">
        <div class="chart-box">
          <h6 class="chart-title">Order Status</h6>
          <canvas #orderChart></canvas>
        </div>
      </div>
    </div>
  </div> 
</div>
