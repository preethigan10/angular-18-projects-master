<app-alert></app-alert>
<nav class="navbar navbar-expand-lg px-4 header-bg">
  <!-- Left: Logo -->
  <a class="navbar-brand fw-bold text-dark" routerLink="/home"> MyStore </a>

  <!-- Center: Search -->
  <div class="mx-auto search-box w-50">
    <div class="input-group">
      <input
        type="text"
        class="form-control"
        placeholder="Search products..."
        [(ngModel)]="searchQuery"
        (input)="filterProducts()"
        name="searchQuery"
      />

      <button class="btn btn-light border" (click)="searchProduct()">
        <i class="bi bi-search text-dark"></i>
      </button>
    </div>

    <ul class="list-group suggestion-box" *ngIf="searchQuery">
      <li
        class="list-group-item"
        *ngFor="let product of filteredProducts"
        (click)="selectProduct(product)"
      >
        {{ product.title }}
      </li>
    </ul>
  </div>

  <!-- Right -->
  <div class="d-flex align-items-center gap-4">
    <!-- Cart -->
    <button class="btn position-relative" (click)="goToCartPage()">
      <i class="bi bi-cart3 fs-4 text-dark"></i>

      @if (cartService.cartItemsNumber(); as cart) {
        <span class="position-absolute top-0 start-60 badge bg-danger">
          {{ cart }}
        </span>
      }
    </button>
    @if(authService.userSignal() == null) {
      <button class="btn btn-outline-primary btn-sm" (click)="signInModal = true">
      Sign In
      </button>

      <button class="btn btn-primary btn-sm" (click)="signUpModal = true">
        Sign Up
      </button>
    } @else {
      <!-- PROFILE ICON -->
    <div class="profile" (click)="toggleProfile()">
      <i class="bi bi-person-circle"></i>
    </div>

    <!-- DROPDOWN -->
    <div class="profile-dropdown" *ngIf="showProfile">
      <div class="user-info">
        <i class="bi bi-person-circle fs-3"></i>
        <div>
          <div class="fw-semibold">{{ authService.userSignal().name }}</div>
          <small class="text-muted">{{ authService.userSignal().email }}</small>
        </div>
      </div>

      <hr />

      <div class="logout" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        <span>Sign Out</span>
      </div>
    </div>
    }
    
  </div>
</nav>

<app-sign-in
  [isVisible]="signInModal"
  (closePopup)="signInModal = false"
  (openSignUp)="signUpModal = true; signInModal = false"
></app-sign-in>

<app-sign-up
  [isVisible]="signUpModal"
  (closePopup)="signUpModal = false"
  (openSignIn)="signInModal = true; signUpModal = false"
></app-sign-up>
