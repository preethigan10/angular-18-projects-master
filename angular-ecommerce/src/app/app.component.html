<div class="page-container">
  <div class="header">
    <app-header
      *ngIf="
        authService.userSignal() == null ||
        authService.userSignal()?.role != 'vendor'
      "
    ></app-header>
    <app-vendor-header
      *ngIf="authService.userSignal()?.role == 'vendor'"
    ></app-vendor-header>
  </div>

  <div class="content">
    <router-outlet></router-outlet>
  </div>

  <app-footer></app-footer>
</div>
