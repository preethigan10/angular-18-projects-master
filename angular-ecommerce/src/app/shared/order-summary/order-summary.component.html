<div class="summary-box">
  <h6 class="fw-bold mb-3">
    <i class="bi bi-receipt me-2"></i>
    Order Summary
  </h6>

  <div class="d-flex justify-content-between mb-2">
    <span>Total Items</span>
    <span>{{ totalItems }}</span>
  </div>

  <div class="d-flex justify-content-between mb-2">
    <span>Subtotal</span>
    <span>₹{{ totalPrice }}</span>
  </div>

  <div class="d-flex justify-content-between mb-2">
    <span>Shipping</span>
    <span class="text-success">Free</span>
  </div>

  <hr />

  <div class="d-flex justify-content-between fw-bold mb-3">
    <span>Total</span>
    <span>₹{{ totalPrice }}</span>
  </div>

  <button
    class="btn btn-primary w-100 py-2"
    (click)="proceed();"
    [disabled]="buttonDisabled || totalItems === 0"
  >
    {{ buttonText }}
  </button>
</div>

<app-sign-in
  [isVisible]="signInModal"
  (closePopup)="signInModal = false"
  (openSignUp)="signUpModal = true; signInModal = false"
></app-sign-in>

<app-sign-up
  [isVisible]="signUpModal"
  (closePopup)="signUpModal = false"
  (openSignIn)="signInModal = true; signUpModal = false"
></app-sign-up>
